name: openknowledge-runtime

services:
  serve:
    build:
      context: ../..
      dockerfile: docker/runtime.Dockerfile
      target: serve
    command: ["--config", "/etc/openknowledge/runtime.toml"]
    depends_on:
      publisher:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - artifacts:/artifacts:ro
      - ./runtime.toml:/etc/openknowledge/runtime.toml:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/openknowledge", "runtime", "serve", "--config", "/etc/openknowledge/runtime.toml", "--check"]
      interval: 30s
      timeout: 10s
      retries: 3

  publisher:
    build:
      context: ../..
      dockerfile: docker/runtime.Dockerfile
      target: publisher
    command: ["--config", "/etc/openknowledge/runtime.toml"]
    secrets:
      - github_app_key
    volumes:
      - artifacts:/artifacts
      - publisher-state:/var/lib/openknowledge
      - exchange:/exchange
      - ./runtime.toml:/etc/openknowledge/runtime.toml:ro
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    restart: unless-stopped

  worker-codex:
    profiles: ["codex"]
    build:
      context: ../..
      dockerfile: docker/runtime.Dockerfile
      target: worker-codex
      args:
        CODEX_VERSION: "${CODEX_VERSION:-0.128.0}"
    command: ["--role", "jobs", "--runtime", "codex", "--config", "/etc/openknowledge/runtime.toml"]
    depends_on:
      publisher:
        condition: service_started
    environment:
      CODEX_API_KEY_FILE: /run/secrets/codex_api_key
    secrets:
      - codex_api_key
    volumes:
      - jobs-codex-state:/var/lib/openknowledge
      - exchange:/exchange
      - ./runtime.toml:/etc/openknowledge/runtime.toml:ro
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    restart: unless-stopped

  worker-claude:
    profiles: ["claude"]
    build:
      context: ../..
      dockerfile: docker/runtime.Dockerfile
      target: worker-claude
      args:
        CLAUDE_CODE_VERSION: "${CLAUDE_CODE_VERSION:-2.1.212}"
    command: ["--role", "jobs", "--runtime", "claude", "--config", "/etc/openknowledge/runtime.toml"]
    depends_on:
      publisher:
        condition: service_started
    environment:
      ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_api_key
    secrets:
      - anthropic_api_key
    volumes:
      - jobs-claude-state:/var/lib/openknowledge
      - exchange:/exchange
      - ./runtime.toml:/etc/openknowledge/runtime.toml:ro
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    restart: unless-stopped

  worker-opencode:
    profiles: ["opencode"]
    build:
      context: ../..
      dockerfile: docker/runtime.Dockerfile
      target: worker-opencode
      args:
        OPENCODE_VERSION: "${OPENCODE_VERSION:-1.18.3}"
    command: ["--role", "jobs", "--runtime", "opencode", "--config", "/etc/openknowledge/runtime.toml"]
    depends_on:
      publisher:
        condition: service_started
    environment:
      OPENCODE_API_KEY_FILE: /run/secrets/opencode_api_key
    secrets:
      - opencode_api_key
    volumes:
      - jobs-opencode-state:/var/lib/openknowledge
      - exchange:/exchange
      - ./runtime.toml:/etc/openknowledge/runtime.toml:ro
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    restart: unless-stopped

  worker-grok:
    profiles: ["grok"]
    build:
      context: ../..
      dockerfile: docker/runtime.Dockerfile
      target: worker-grok
      args:
        GROK_VERSION: "${GROK_VERSION:-0.2.103}"
    command: ["--role", "jobs", "--runtime", "grok", "--config", "/etc/openknowledge/runtime.toml"]
    depends_on:
      publisher:
        condition: service_started
    environment:
      XAI_API_KEY_FILE: /run/secrets/xai_api_key
    secrets:
      - xai_api_key
    volumes:
      - jobs-grok-state:/var/lib/openknowledge
      - exchange:/exchange
      - ./runtime.toml:/etc/openknowledge/runtime.toml:ro
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    restart: unless-stopped

volumes:
  artifacts:
  publisher-state:
  jobs-codex-state:
  jobs-claude-state:
  jobs-opencode-state:
  jobs-grok-state:
  exchange:

secrets:
  codex_api_key:
    file: ./secrets/codex_api_key
  anthropic_api_key:
    file: ./secrets/anthropic_api_key
  xai_api_key:
    file: ./secrets/xai_api_key
  opencode_api_key:
    file: ./secrets/opencode_api_key
  github_app_key:
    file: ./secrets/github-app.pem

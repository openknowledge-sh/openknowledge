name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/cli/go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Go modules are tidy
        shell: bash
        run: |
          go -C packages/cli mod tidy
          git diff --exit-code -- packages/cli/go.mod packages/cli/go.sum

      - name: Test
        run: pnpm test

      - name: Vet
        run: go vet ./packages/cli/...

      - name: Build
        run: pnpm build

      - name: Validate repository wiki
        run: ./bin/openknowledge validate Wiki

      - name: Verify generated files are current
        run: git diff --exit-code

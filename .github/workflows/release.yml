name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.6.0 or v0.6.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      npm_tag: ${{ steps.release.outputs.npm_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Require current default branch tip
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          expected_ref="refs/heads/$DEFAULT_BRANCH"
          if [ "$GITHUB_REF" != "$expected_ref" ]; then
            echo "Releases must be dispatched from $expected_ref, not $GITHUB_REF" >&2
            exit 1
          fi

          git fetch --no-tags origin "$expected_ref:refs/remotes/origin/$DEFAULT_BRANCH"
          head_commit="$(git rev-parse HEAD)"
          default_commit="$(git rev-parse "refs/remotes/origin/$DEFAULT_BRANCH")"
          if [ "$head_commit" != "$default_commit" ]; then
            echo "Release commit $head_commit is not the current $DEFAULT_BRANCH tip $default_commit" >&2
            exit 1
          fi

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          raw="${{ inputs.version }}"
          version="${raw#v}"
          tag="v${version}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must look like 0.6.0, v0.6.0, or v0.6.0-rc.1" >&2
            exit 1
          fi

          npm_tag="latest"
          if [[ "$version" == *-* ]]; then
            npm_tag="next"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: packages/cli/go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release versions
        run: node scripts/check-versions.mjs "${{ steps.release.outputs.version }}"

      - name: Verify Go modules are tidy
        shell: bash
        run: |
          go -C packages/cli mod tidy
          git diff --exit-code -- packages/cli/go.mod packages/cli/go.sum

      - name: Run release quality gate
        run: |
          pnpm test
          go vet ./packages/cli/...
          pnpm build

      - name: Verify release binary and wiki
        shell: bash
        run: |
          version="${{ steps.release.outputs.version }}"
          go build -ldflags "-X main.version=$version" -o bin/openknowledge ./packages/cli/cmd/openknowledge
          test "$(./bin/openknowledge version)" = "$version"
          ./bin/openknowledge validate Wiki

      - name: Verify npm package contents
        working-directory: packages/npm
        env:
          OPENKNOWLEDGE_SKIP_DOWNLOAD: "1"
        run: npm pack --dry-run --json

      - name: Verify npm publishing credentials
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is required before creating the release tag." >&2
            exit 1
          fi
          npm whoami --registry=https://registry.npmjs.org

  publish_release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout verified release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Prepare release tag
        shell: bash
        run: |
          tag="${{ needs.verify.outputs.tag }}"
          git fetch --force origin "refs/tags/$tag:refs/tags/$tag" || true

          if git rev-parse --verify --quiet "$tag" >/dev/null; then
            tag_commit="$(git rev-list -n 1 "$tag")"
            head_commit="$(git rev-parse HEAD)"

            if [ "$tag_commit" != "$head_commit" ]; then
              echo "Tag $tag already exists but points at $tag_commit, not current commit $head_commit" >&2
              exit 1
            fi

            echo "Reusing existing tag $tag on current commit"
            git checkout --detach "$tag"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "refs/tags/$tag"
          git checkout --detach "$tag"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release archives
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt

  npm:
    needs: [verify, publish_release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.verify.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify npm package version
        run: node scripts/check-versions.mjs "${{ needs.verify.outputs.version }}"

      - name: Publish npm package
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_DIST_TAG: ${{ needs.verify.outputs.npm_tag }}
        run: npm publish --provenance --access public --tag "$NPM_DIST_TAG"

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 0.6.0 or v0.6.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      npm_tag: ${{ steps.release.outputs.npm_tag }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          raw="${{ inputs.version }}"
          version="${raw#v}"
          tag="v${version}"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must look like 0.6.0, v0.6.0, or v0.6.0-rc.1" >&2
            exit 1
          fi

          npm_tag="latest"
          if [[ "$version" == *-* ]]; then
            npm_tag="next"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/cli/go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release versions
        run: node scripts/check-versions.mjs "${{ steps.release.outputs.version }}"

      - name: Verify Go modules are tidy
        shell: bash
        run: |
          go -C packages/cli mod tidy
          git diff --exit-code -- packages/cli/go.mod packages/cli/go.sum

      - name: Run release quality gate
        run: |
          pnpm test
          go vet ./packages/cli/...
          pnpm build

      - name: Verify release binary and wiki
        shell: bash
        run: |
          version="${{ steps.release.outputs.version }}"
          go build -ldflags "-X main.version=$version" -o bin/openknowledge ./packages/cli/cmd/openknowledge
          test "$(./bin/openknowledge version)" = "$version"
          ./bin/openknowledge validate Wiki

      - name: Verify npm package contents
        working-directory: packages/npm
        env:
          OPENKNOWLEDGE_SKIP_DOWNLOAD: "1"
        run: npm pack --dry-run --json

      - name: Verify npm publishing credentials
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is required before creating the release tag." >&2
            exit 1
          fi
          npm whoami --registry=https://registry.npmjs.org

      - name: Prepare release tag
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          git fetch --force origin "refs/tags/$tag:refs/tags/$tag" || true

          if git rev-parse --verify --quiet "$tag" >/dev/null; then
            tag_commit="$(git rev-list -n 1 "$tag")"
            head_commit="$(git rev-parse HEAD)"

            if [ "$tag_commit" != "$head_commit" ]; then
              echo "Tag $tag already exists but points at $tag_commit, not current commit $head_commit" >&2
              exit 1
            fi

            echo "Reusing existing tag $tag on current commit"
            git checkout --detach "$tag"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "refs/tags/$tag"
          git checkout --detach "$tag"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.goreleaser.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify npm package version
        run: node scripts/check-versions.mjs "${{ needs.goreleaser.outputs.version }}"

      - name: Publish npm package
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_DIST_TAG: ${{ needs.goreleaser.outputs.npm_tag }}
        run: npm publish --provenance --access public --tag "$NPM_DIST_TAG"

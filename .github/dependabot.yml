version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Etc/UTC"

  - package-ecosystem: "gomod"
    directory: "/packages/cli"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Etc/UTC"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "Etc/UTC"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:45"
      timezone: "Etc/UTC"

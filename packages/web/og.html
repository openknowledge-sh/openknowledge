<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1200, initial-scale=1">
    <title>Open Knowledge LLM Wiki Tooling OG Image</title>
    <link rel="stylesheet" href="styles.css">
    <style>
      html,
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }

      body {
        min-height: 630px;
      }

      .og-shell.shell {
        width: 1200px;
        max-width: none;
        height: 630px;
        margin: 0;
        padding: 72px 0 0 78px;
        overflow: hidden;
      }

      .og-shell .site-topbar {
        justify-content: flex-start;
        width: 900px;
        margin-bottom: 38px;
      }

      .og-shell .site-logo {
        gap: 14px;
      }

      .og-shell .site-logo img {
        width: 30px;
        height: 30px;
      }

      .og-shell .intro {
        max-width: 900px;
      }

      .og-shell h1 {
        max-width: 900px;
        margin-bottom: 24px;
        font-size: 66px;
      }

      .og-shell .lede {
        max-width: 900px;
        margin-bottom: 22px;
        font-size: 23px;
      }

      .og-shell .spec-note {
        max-width: 900px;
        font-size: 17px;
      }
    </style>
  </head>
  <body>
    <main class="shell og-shell">
      <header class="site-topbar" aria-label="Site navigation">
        <div class="site-logo" aria-label="Open Knowledge CLI">
          <img src="favicon.png" alt="" aria-hidden="true">
          <span>Open Knowledge CLI</span>
        </div>
      </header>

      <section class="intro">
        <h1>LLM wiki tooling for you and your agents</h1>
        <p class="lede">
          Open Knowledge CLI creates Git-native project context that humans and agents can read, maintain, and publish.
        </p>
        <p class="spec-note">
          Implements the
          <a href="https://github.com/GoogleCloudPlatform/knowledge-catalog/blob/main/okf/SPEC.md" target="_blank" rel="noreferrer">Open Knowledge Format v0.1</a>
          specification for Markdown and YAML-frontmatter knowledge bases.
        </p>
      </section>
    </main>
  </body>
</html>
